name: HSMS CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hsms-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend_ci:
    name: Backend CI
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hsms_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      ASPNETCORE_ENVIRONMENT: Integration
      ASPNETCORE_URLS: http://127.0.0.1:5162
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      MANAGER_PASSWORD: ${{ secrets.MANAGER_PASSWORD }}
      CASHIER_PASSWORD: ${{ secrets.CASHIER_PASSWORD }}
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: hsms_test
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_ISSUER: hsms-ci
      JWT_AUDIENCE: hsms-ci-clients
      JWT_ACCESS_TOKEN_EXPIRY_MINUTES: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj', 'backend/**/*.sln') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore backend
        run: dotnet restore backend/HSMS.sln

      - name: Build backend
        run: dotnet build backend/HSMS.sln -c Release --no-restore

      - name: Run backend test suite
        run: dotnet test backend/HSMS.Tests/HSMS.Tests.csproj -c Release --no-build --collect:"XPlat Code Coverage" --settings backend/HSMS.Tests/coverlet.runsettings --logger "trx;LogFileName=backend-tests.trx"

      - name: Start backend API for API tests
        working-directory: backend
        run: dotnet run --project HSMS.API/HSMS.API.csproj -c Release --no-build --no-launch-profile > "$RUNNER_TEMP/hsms-api.log" 2>&1 &

      - name: Wait for backend health endpoint
        run: |
          for i in {1..30}; do
            if curl --fail --silent http://127.0.0.1:5162/api/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "Backend API failed to become ready."
          cat "$RUNNER_TEMP/hsms-api.log"
          exit 1

      - name: Run backend API tests
        run: dotnet test backend/HSMS.ApiTests/HSMS.ApiTests.csproj -c Release --no-build --logger "trx;LogFileName=api-tests.trx"

      - name: Upload backend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            backend/**/TestResults/**/coverage.cobertura.xml
            backend/**/TestResults/**/*.trx
            ${{ runner.temp }}/hsms-api.log
          if-no-files-found: warn

  frontend_ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/HWSMS_UI/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend/HWSMS_UI
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend/HWSMS_UI
        run: npm test

      - name: Build frontend
        working-directory: frontend/HWSMS_UI
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/HWSMS_UI/dist
          if-no-files-found: error

  deploy_backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs:
      - backend_ci
      - frontend_ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore backend
        run: dotnet restore backend/HSMS.sln

      - name: Publish backend API
        run: dotnet publish backend/HSMS.API/HSMS.API.csproj -c Release -o ${{ runner.temp }}/backend_publish

      - name: Deploy backend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ runner.temp }}/backend_publish

  deploy_frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs:
      - backend_ci
      - frontend_ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend_build

      - name: Deploy frontend to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APP_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend_build
          output_location: ""

  smoke_test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs:
      - deploy_backend
      - deploy_frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    env:
      BACKEND_PUBLIC_URL: ${{ vars.BACKEND_PUBLIC_URL }}
      AZURE_BACKEND_APP_NAME: ${{ vars.AZURE_BACKEND_APP_NAME }}
      FRONTEND_PUBLIC_URL: ${{ vars.FRONTEND_PUBLIC_URL }}

    steps:
      - name: Check backend and database health
        run: |
          BACKEND_URL="${BACKEND_PUBLIC_URL}"
          if [ -z "$BACKEND_URL" ] && [ -n "$AZURE_BACKEND_APP_NAME" ]; then
            BACKEND_URL="https://${AZURE_BACKEND_APP_NAME}.azurewebsites.net"
          fi

          if [ -z "$BACKEND_URL" ]; then
            echo "Missing backend URL. Set BACKEND_PUBLIC_URL or AZURE_BACKEND_APP_NAME in repository variables."
            exit 1
          fi

          BACKEND_URL="${BACKEND_URL%/}"

          for i in {1..20}; do
            RESPONSE="$(curl --silent --show-error --fail "${BACKEND_URL}/api/health")" && break
            sleep 10
          done

          if [ -z "$RESPONSE" ]; then
            echo "Backend health endpoint did not return a healthy response."
            exit 1
          fi

          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"healthy"'
          echo "$RESPONSE" | grep -q '"mysql"'
          echo "$RESPONSE" | grep -q '"status":"healthy","description":"Database connection is available."'

      - name: Check frontend availability
        run: |
          if [ -z "${FRONTEND_PUBLIC_URL}" ]; then
            echo "Missing frontend URL. Set FRONTEND_PUBLIC_URL in repository variables."
            exit 1
          fi

          FRONTEND_URL="${FRONTEND_PUBLIC_URL%/}"

          for i in {1..20}; do
            HTML="$(curl --silent --show-error --fail "${FRONTEND_URL}/")" && break
            sleep 10
          done

          if [ -z "$HTML" ]; then
            echo "Frontend did not respond successfully."
            exit 1
          fi

          echo "$HTML" | grep -q '<div id="root"></div>'

  notify_failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs:
      - backend_ci
      - frontend_ci
      - deploy_backend
      - deploy_frontend
      - smoke_test
    if: always() && contains(needs.*.result, 'failure')
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Write failure summary
        run: |
          echo "## HSMS CI/CD failed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflow: $GITHUB_WORKFLOW" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch/ref: $GITHUB_REF" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" >> "$GITHUB_STEP_SUMMARY"

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"HSMS CI/CD failed: ${RUN_URL}\"}" \
            "$SLACK_WEBHOOK_URL"
