name: HSMS Full-stack CI/CD

on:
  push:
    branches:
      - deploy
  pull_request:
    branches:
      - main
      - deploy

jobs:
  backend_build:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore solution
        run: dotnet restore backend/HSMS.sln

      - name: Build solution
        run: dotnet build backend/HSMS.sln --configuration Release --no-restore

      - name: Publish API
        run: dotnet publish backend/HSMS.API/HSMS.API.csproj --configuration Release --no-restore --output "${{ runner.temp }}\publish"

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: ${{ runner.temp }}\publish

  backend_deploy:
    name: Deploy Backend
    runs-on: windows-latest
    needs: backend_build
    if: github.event_name == 'push'
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-app

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: cspbackend
          slot-name: Production
          package: backend-app

  frontend_build_and_deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and deploy Static Web App
        id: swa
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/HWSMS_UI
          api_location: ""
          output_location: dist

  frontend_close_pull_request:
    name: Close Static Web Apps PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - name: Close pull request environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
