name: HSMS CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hsms-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Shared image tag: short SHA so every push produces a traceable image.
# "latest" is also pushed on main so the registry always has a stable tag.
# ─────────────────────────────────────────────────────────────────────────────
env:
  ACR_REGISTRY: ${{ vars.ACR_LOGIN_SERVER }}     # hsmsdocker.azurecr.io
  BACKEND_IMAGE: hsms-backend
  FRONTEND_IMAGE: hsms-frontend
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # 1. BACKEND CI — build, unit tests, API tests (unchanged)
  # ───────────────────────────────────────────────────────────────────────────
  backend_ci:
    name: Backend CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # CI only runs on pull requests — push to main goes straight to build & deploy
    if: github.event_name == 'pull_request'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hsms_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      ASPNETCORE_ENVIRONMENT: Integration
      ASPNETCORE_URLS: http://127.0.0.1:5162
      Password__Admin: ${{ secrets.Password__Admin }}
      Password__Manager: ${{ secrets.Password__Manager }}
      Password__Cashier: ${{ secrets.Password__Cashier }}
      DB__HOST: 127.0.0.1
      DB__PORT: 3306
      DB__NAME: hsms_test
      DB__USER: root
      DB__PASSWORD: root
      JWT__SECRET: ${{ secrets.JWT__SECRET }}
      JWT__ISSUER: hsms-ci
      JWT__AUDIENCE: hsms-ci-clients
      JWT__ACCESSTOKENEXPIRYMINUTES: 60
      URL__BACKEND: http://127.0.0.1:5162

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj', 'backend/**/*.sln') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore backend
        run: dotnet restore backend/HSMS.sln

      - name: Build backend
        run: dotnet build backend/HSMS.sln -c Release --no-restore

      - name: Run backend test suite
        run: dotnet test backend/HSMS.Tests/HSMS.Tests.csproj -c Release --no-build --collect:"XPlat Code Coverage" --settings backend/HSMS.Tests/coverlet.runsettings --logger "trx;LogFileName=backend-tests.trx"

      - name: Start backend API for API tests
        working-directory: backend
        run: dotnet run --project HSMS.API/HSMS.API.csproj -c Release --no-build --no-launch-profile > "$RUNNER_TEMP/hsms-api.log" 2>&1 &

      - name: Wait for backend health endpoint
        run: |
          for i in {1..30}; do
            if curl --fail --silent http://127.0.0.1:5162/api/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "Backend API failed to become ready."
          cat "$RUNNER_TEMP/hsms-api.log"
          exit 1

      - name: Run backend API tests
        run: dotnet test backend/HSMS.ApiTests/HSMS.ApiTests.csproj -c Release --no-build --logger "trx;LogFileName=api-tests.trx"

      - name: Upload backend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            backend/**/TestResults/**/coverage.cobertura.xml
            backend/**/TestResults/**/*.trx
            ${{ runner.temp }}/hsms-api.log
          if-no-files-found: warn

  # ───────────────────────────────────────────────────────────────────────────
  # 2. FRONTEND CI — install, test, build (unchanged)
  # ───────────────────────────────────────────────────────────────────────────
  frontend_ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # CI only runs on pull requests — push to main goes straight to build & deploy
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/HWSMS_UI/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend/HWSMS_UI
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend/HWSMS_UI
        run: npm test

      - name: Build frontend (verify Vite build succeeds)
        working-directory: frontend/HWSMS_UI
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

  # ───────────────────────────────────────────────────────────────────────────
  # 3. BUILD & PUSH BACKEND IMAGE → ACR
  #    Only runs on push to main (not on PRs).
  # ───────────────────────────────────────────────────────────────────────────
  build_push_backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    # CI jobs are skipped on push, so no needs here — runs independently on push to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ vars.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ vars.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=registry,ref=${{ vars.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:cache
          cache-to: type=registry,ref=${{ vars.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:cache,mode=max

      - name: Output image reference
        run: |
          echo "## Backend Image Published" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Registry**: ${{ vars.ACR_LOGIN_SERVER }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image**: ${{ env.BACKEND_IMAGE }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tags**: \`${{ env.IMAGE_TAG }}\` · \`latest\`" >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # 4. BUILD & PUSH FRONTEND IMAGE → ACR
  #    VITE_API_BASE_URL is passed as a build argument so the correct
  #    production backend URL is baked into the Nginx-served bundle.
  # ───────────────────────────────────────────────────────────────────────────
  build_push_frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    # CI jobs are skipped on push, so no needs here — runs independently on push to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/HWSMS_UI
          file: ./frontend/HWSMS_UI/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          tags: |
            ${{ vars.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ vars.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=registry,ref=${{ vars.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:cache
          cache-to: type=registry,ref=${{ vars.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:cache,mode=max

      - name: Output image reference
        run: |
          echo "## Frontend Image Published" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Registry**: ${{ vars.ACR_LOGIN_SERVER }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image**: ${{ env.FRONTEND_IMAGE }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tags**: \`${{ env.IMAGE_TAG }}\` · \`latest\`" >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # 5 DEPLOY TO AZURE CONTAINER APPS
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs:
      - build_push_backend
      - build_push_frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Backend to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: hsmsdocker
          containerAppName: hsms-backend-app
          resourceGroup: ${{ vars.ACA_RESOURCE_GROUP }}
          imageToDeploy: ${{ vars.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Deploy Frontend to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: hsmsdocker
          containerAppName: hsms-frontend-app
          resourceGroup: ${{ vars.ACA_RESOURCE_GROUP }}
          imageToDeploy: ${{ vars.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}

  # ───────────────────────────────────────────────────────────────────────────
  # 6. SMOKE TEST — hits the live endpoints after images are published.
  #    Still validates the CURRENTLY RUNNING deployment, so it remains useful
  #    even before you redeploy the containers from the new images.
  # ───────────────────────────────────────────────────────────────────────────
  smoke_test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs:
      - deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    env:
      Url__Backend: ${{ secrets.Url__Backend }}
      Url__Frontend: ${{ secrets.Url__Frontend }}

    steps:
      - name: Check backend and database health
        run: |
          BACKEND_URL="${Url__Backend}"

          # CRITICAL CHECK: Exit immediately if the backend URL is missing
          if [ -z "$BACKEND_URL" ]; then
            echo "ERROR: Backend URL is not available! Please set 'Url__Backend' in your GitHub."
            exit 1
          fi

          # Strip any trailing slash to avoid double slashes in the curl command
          BACKEND_URL="${BACKEND_URL%/}"
          echo "Checking backend health at: ${BACKEND_URL}/api/health"

          for i in {1..20}; do
            RESPONSE="$(curl --silent --show-error --fail "${BACKEND_URL}/api/health")" && break
            sleep 10
          done

          if [ -z "$RESPONSE" ]; then
            echo "ERROR: Backend health endpoint did not respond within the time limit."
            exit 1
          fi

          echo "Response received: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"healthy"'
          echo "$RESPONSE" | grep -q '"mysql"'
          echo "$RESPONSE" | grep -q '"status":"healthy","description":"Database connection is available."'
          echo "Backend and Database are healthy!"

      - name: Check frontend availability
        run: |
          FRONTEND_URL="${Url__Frontend}"

          # CRITICAL CHECK: Exit immediately if the frontend URL is missing
          if [ -z "$FRONTEND_URL" ]; then
            echo "ERROR: Frontend URL is not available! Please set 'Url__Frontend' in your GitHub."
            exit 1
          fi

          # Strip any trailing slash
          FRONTEND_URL="${FRONTEND_URL%/}"
          echo "Checking frontend availability at: ${FRONTEND_URL}/"

          for i in {1..20}; do
            HTML="$(curl --silent --show-error --fail "${FRONTEND_URL}/")" && break
            sleep 10
          done

          if [ -z "$HTML" ]; then
            echo "ERROR: Frontend did not respond successfully."
            exit 1
          fi

          echo "$HTML" | grep -q '<div id="root"></div>'
          echo "Frontend is live and hosting the React container!"

  # ───────────────────────────────────────────────────────────────────────────
  # 7. NOTIFY FAILURE — Slack webhook on any job failure (unchanged)
  # ───────────────────────────────────────────────────────────────────────────
  notify_failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs:
      - backend_ci
      - frontend_ci
      - build_push_backend
      - build_push_frontend
      - deploy
      - smoke_test
    if: always() && contains(needs.*.result, 'failure')
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Write failure summary
        run: |
          echo "## HSMS CI/CD failed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflow: $GITHUB_WORKFLOW" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch/ref: $GITHUB_REF" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" >> "$GITHUB_STEP_SUMMARY"

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"HSMS CI/CD failed: ${RUN_URL}\"}" \
            "$SLACK_WEBHOOK_URL"
