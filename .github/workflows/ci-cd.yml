name: HSMS CI/CD

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["develop", "main"]
  push:
    branches: ["develop", "main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hsms-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

# =========================
# 🔵 BACKEND CI
# =========================
  backend_ci:
    name: Backend CI (Build + Tests + Coverage)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hsms_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      HSMS_TEST_CONNECTION_STRING: Server=127.0.0.1;Port=3306;Database=hsms_test;Uid=root;Pwd=root

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj', 'backend/**/*.sln') }}

      - name: Restore
        run: dotnet restore backend/HSMS.sln

      - name: Build
        run: dotnet build backend/HSMS.sln -c Release --no-restore

      - name: Run Tests with Coverage
        run: dotnet test backend/HSMS.sln -c Release --no-build --collect:"XPlat Code Coverage" --settings backend/HSMS.Tests/coverlet.runsettings

      - name: Upload Backend Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: |
            backend/**/TestResults/**/coverage.cobertura.xml
            backend/**/TestResults/**/*.trx
          if-no-files-found: warn

# =========================
# 🟣 FRONTEND CI
# =========================
  frontend_ci:
    name: Frontend CI (Build + Tests)
    runs-on: ubuntu-latest

    outputs:
      build-path: frontend/HWSMS_UI/dist

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/HWSMS_UI/package-lock.json

      - name: Install Dependencies
        working-directory: frontend/HWSMS_UI
        run: npm ci

      - name: Run Frontend Tests
        working-directory: frontend/HWSMS_UI
        run: npm test

      - name: Build Frontend
        working-directory: frontend/HWSMS_UI
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/HWSMS_UI/dist

# =========================
# 🔵 BACKEND DEPLOY
# =========================
  deploy_backend:
    name: Deploy Backend (Azure App Service)
    runs-on: ubuntu-latest
    needs: [backend_ci, frontend_ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore backend/HSMS.sln

      - name: Publish API
        run: dotnet publish backend/HSMS.API/HSMS.API.csproj -c Release -o ${{ runner.temp }}/backend_publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ runner.temp }}/backend_publish

# =========================
# 🟢 FRONTEND DEPLOY
# =========================
  deploy_frontend:
    name: Deploy Frontend (Azure Static Web Apps)
    runs-on: ubuntu-latest
    needs: [backend_ci, frontend_ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend_build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APP_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend_build"
          output_location: ""

# =========================
# 🧪 POST-DEPLOY VERIFY
# =========================
  smoke_test:
    name: Verify Live Deployment
    runs-on: ubuntu-latest
    needs: [deploy_backend, deploy_frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      BACKEND_PUBLIC_URL: ${{ vars.BACKEND_PUBLIC_URL }}
      AZURE_BACKEND_APP_NAME: ${{ vars.AZURE_BACKEND_APP_NAME }}
      FRONTEND_PUBLIC_URL: ${{ vars.FRONTEND_PUBLIC_URL }}

    steps:
      - name: Check Backend Health
        run: |
          BACKEND_URL="${BACKEND_PUBLIC_URL}"
          if [ -z "$BACKEND_URL" ] && [ -n "$AZURE_BACKEND_APP_NAME" ]; then
            BACKEND_URL="https://${AZURE_BACKEND_APP_NAME}.azurewebsites.net"
          fi

          if [ -z "$BACKEND_URL" ]; then
            echo "Missing backend URL. Set BACKEND_PUBLIC_URL or AZURE_BACKEND_APP_NAME in repository variables."
            exit 1
          fi

          BACKEND_URL="${BACKEND_URL%/}"
          echo "Checking backend health at ${BACKEND_URL}/api/health"
          curl --fail --show-error --silent "${BACKEND_URL}/api/health"

      - name: Check Frontend Availability
        run: |
          if [ -z "${FRONTEND_PUBLIC_URL}" ]; then
            echo "Missing frontend URL. Set FRONTEND_PUBLIC_URL in repository variables."
            exit 1
          fi
          curl --fail --show-error --silent --head "${FRONTEND_PUBLIC_URL}"

# =========================
# 🔔 FAILURE NOTIFICATION
# =========================
  notify_failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [backend_ci, frontend_ci, deploy_backend, deploy_frontend, smoke_test]
    if: always() && contains(needs.*.result, 'failure')
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Write Failure Summary
        run: |
          echo "## HSMS CI/CD failed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflow: $GITHUB_WORKFLOW" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch/ref: $GITHUB_REF" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" >> "$GITHUB_STEP_SUMMARY"

      - name: Send Slack Notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"HSMS CI/CD failed: ${RUN_URL}\"}" \
            "$SLACK_WEBHOOK_URL"
