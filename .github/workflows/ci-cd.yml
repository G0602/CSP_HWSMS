name: HSMS CI/CD

on:
  pull_request:
    branches: ["develop", "main"]
  push:
    branches: ["develop", "main"]

permissions:
  contents: read

concurrency:
  group: hsms-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend_ci:
    name: Backend CI (Build + Test)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ vars.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj', 'backend/**/*.sln') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore backend/HSMS.sln

      - name: Build
        run: dotnet build backend/HSMS.sln -c Release --no-restore

      - name: Test
        run: dotnet test backend/HSMS.Tests/HSMS.Tests.csproj -c Release --no-build --verbosity normal

  frontend_ci:
    name: Frontend CI (Install + Build)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/HWSMS_UI/package-lock.json

      - name: Install
        working-directory: frontend/HWSMS_UI
        run: npm ci

      - name: Build
        working-directory: frontend/HWSMS_UI
        run: npm run build

  deploy_main:
    name: Deploy (Main only)
    runs-on: ubuntu-latest
    needs: [backend_ci, frontend_ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ vars.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj', 'backend/**/*.sln') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore backend
        run: dotnet restore backend/HSMS.sln

      - name: Publish API
        run: dotnet publish backend/HSMS.API/HSMS.API.csproj -c Release --no-restore -o ${{ runner.temp }}/backend_publish

      - name: Deploy Azure Web App (Backend)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ runner.temp }}/backend_publish

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/HWSMS_UI/package-lock.json

      - name: Install & Build Frontend
        working-directory: frontend/HWSMS_UI
        run: |
          npm ci
          npm run build

          