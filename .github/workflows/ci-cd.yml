name: HSMS CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hsms-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend_ci:
    name: Backend CI
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hsms_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      ASPNETCORE_ENVIRONMENT: Integration
      ASPNETCORE_URLS: http://127.0.0.1:5162
      Password__Admin: ${{ secrets.Password__Admin }}
      Password__Manager: ${{ secrets.Password__Manager }}
      Password__Cashier: ${{ secrets.Password__Cashier }}
      DB__HOST: 127.0.0.1
      DB__PORT: 3306
      DB__NAME: hsms_test
      DB__USER: root
      DB__PASSWORD: root
      JWT__SECRET: ${{ secrets.JWT__SECRET }}
      JWT__ISSUER: hsms-ci
      JWT__AUDIENCE: hsms-ci-clients
      JWT__ACCESS_TOKEN_EXPIRY_MINUTES: 60
      URL__BACKEND: http://127.0.0.1:5162

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj', 'backend/**/*.sln') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore backend
        run: dotnet restore backend/HSMS.sln

      - name: Build backend
        run: dotnet build backend/HSMS.sln -c Release --no-restore

      - name: Run backend test suite
        run: dotnet test backend/HSMS.Tests/HSMS.Tests.csproj -c Release --no-build --collect:"XPlat Code Coverage" --settings backend/HSMS.Tests/coverlet.runsettings --logger "trx;LogFileName=backend-tests.trx"

      - name: Start backend API for API tests
        working-directory: backend
        run: dotnet run --project HSMS.API/HSMS.API.csproj -c Release --no-build --no-launch-profile > "$RUNNER_TEMP/hsms-api.log" 2>&1 &

      - name: Wait for backend health endpoint
        run: |
          for i in {1..30}; do
            if curl --fail --silent http://127.0.0.1:5162/api/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "Backend API failed to become ready."
          cat "$RUNNER_TEMP/hsms-api.log"
          exit 1

      - name: Run backend API tests
        run: dotnet test backend/HSMS.ApiTests/HSMS.ApiTests.csproj -c Release --no-build --logger "trx;LogFileName=api-tests.trx"

      - name: Upload backend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            backend/**/TestResults/**/coverage.cobertura.xml
            backend/**/TestResults/**/*.trx
            ${{ runner.temp }}/hsms-api.log
          if-no-files-found: warn

  frontend_ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/HWSMS_UI/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend/HWSMS_UI
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend/HWSMS_UI
        run: npm test

      - name: Build frontend
        working-directory: frontend/HWSMS_UI
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/HWSMS_UI/dist
          if-no-files-found: error

  deploy_backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs:
      - backend_ci
      - frontend_ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore backend
        run: dotnet restore backend/HSMS.sln

      - name: Publish backend API
        run: dotnet publish backend/HSMS.API/HSMS.API.csproj -c Release -o ${{ runner.temp }}/backend_publish

      - name: Prepare Azure App Service settings
        shell: bash
        run: |
          SETTINGS="[]"

          add_setting() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              SETTINGS=$(echo "$SETTINGS" | jq --arg n "$name" --arg v "$value" '. += [{"name": $n, "value": $v, "slotSetting": false}]')
            fi
          }

          add_setting "ASPNETCORE_ENVIRONMENT" "Production"
          add_setting "ConnectionStrings__DefaultConnection" "${{ secrets.ConnectionStrings__DefaultConnection }}"
          add_setting "Db__Host" "${{ secrets.DB__HOST }}"
          add_setting "Db__Port" "${{ secrets.DB__PORT }}"
          add_setting "Db__Name" "${{ secrets.DB__NAME }}"
          add_setting "Db__User" "${{ secrets.DB__USER }}"
          add_setting "Db__Password" "${{ secrets.DB__PASSWORD }}"
          add_setting "Jwt__Secret" "${{ secrets.JWT__SECRET }}"
          add_setting "Jwt__Issuer" "${{ secrets.JWT__ISSUER }}"
          add_setting "Jwt__Audience" "${{ secrets.JWT__AUDIENCE }}"
          
          JWT_EXPIRY="${{ secrets.JWT_EXPIRY_MINUTES }}"
          add_setting "Jwt__AccessTokenExpiryMinutes" "${JWT_EXPIRY:-60}"

          add_setting "Url__Frontend" "${{ secrets.Url__Frontend }}"
          add_setting "Url__Backend" "${{ secrets.Url__Backend }}"
          add_setting "CORS_ORIGINS" "${{ secrets.Url__Frontend }}"
          add_setting "FRONTEND_URL" "${{ secrets.Url__Frontend }}"

          echo "APP_SETTINGS_JSON<<EOF" >> "$GITHUB_ENV"
          echo "$SETTINGS" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Update Azure App Service settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ vars.AZURE_BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          app-settings-json: ${{ env.APP_SETTINGS_JSON }}

      - name: Deploy backend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ runner.temp }}/backend_publish

  deploy_frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs:
      - backend_ci
      - frontend_ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend_build

      - name: Deploy frontend to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APP_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend_build
          output_location: ""

  smoke_test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs:
      - deploy_backend
      - deploy_frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    env:
      Url__Backend: ${{ secrets.Url__Backend }}
      Url__Frontend: ${{ secrets.Url__Frontend }}

    steps:
      - name: Check backend and database health
        run: |
          BACKEND_URL="${Url__Backend}"

          # CRITICAL CHECK: Exit immediately if the backend URL is missing
          if [ -z "$BACKEND_URL" ]; then
            echo "ERROR: Backend URL is not available! Please set 'Url__Backend' in your GitHub."
            exit 1
          fi

          # Strip any trailing slash to avoid double slashes in the curl command
          BACKEND_URL="${BACKEND_URL%/}"
          echo "Checking backend health at: ${BACKEND_URL}/api/health"

          for i in {1..20}; do
            RESPONSE="$(curl --silent --show-error --fail "${BACKEND_URL}/api/health")" && break
            sleep 10
          done

          if [ -z "$RESPONSE" ]; then
            echo "ERROR: Backend health endpoint did not respond within the time limit."
            exit 1
          fi

          echo "Response received: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"healthy"'
          echo "$RESPONSE" | grep -q '"mysql"'
          echo "$RESPONSE" | grep -q '"status":"healthy","description":"Database connection is available."'
          echo "Backend and Database are healthy!"

      - name: Check frontend availability
        run: |
          FRONTEND_URL="${Url__Frontend}"

          # CRITICAL CHECK: Exit immediately if the frontend URL is missing
          if [ -z "$FRONTEND_URL" ]; then
            echo "ERROR: Frontend URL is not available! Please set 'Url__Frontend' in your GitHub."
            exit 1
          fi

          # Strip any trailing slash
          FRONTEND_URL="${FRONTEND_URL%/}"
          echo "Checking frontend availability at: ${FRONTEND_URL}/"

          for i in {1..20}; do
            HTML="$(curl --silent --show-error --fail "${FRONTEND_URL}/")" && break
            sleep 10
          done

          if [ -z "$HTML" ]; then
            echo "ERROR: Frontend did not respond successfully."
            exit 1
          fi

          echo "$HTML" | grep -q '<div id="root"></div>'
          echo "Frontend is live and hosting the React container container!"

  notify_failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs:
      - backend_ci
      - frontend_ci
      - deploy_backend
      - deploy_frontend
      - smoke_test
    if: always() && contains(needs.*.result, 'failure')
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Write failure summary
        run: |
          echo "## HSMS CI/CD failed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflow: $GITHUB_WORKFLOW" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch/ref: $GITHUB_REF" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" >> "$GITHUB_STEP_SUMMARY"

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"HSMS CI/CD failed: ${RUN_URL}\"}" \
            "$SLACK_WEBHOOK_URL"
