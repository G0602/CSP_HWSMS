name: HSMS CI/CD

on:
  pull_request:
    branches: [ "develop", "main" ]
  push:
    branches: [ "develop", "main" ]

permissions:
  id-token: write
  contents: read

concurrency:
  group: hsms-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend_ci:
    name: Backend CI (Build + Test)
    runs-on: ubuntu-latest
    # Run CI for PRs, and for pushes to develop only (avoid duplicate CI on main pushes)
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ vars.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj', 'backend/**/*.sln') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore backend/HSMS.sln

      - name: Build
        run: dotnet build backend/HSMS.sln -c Release --no-restore

      - name: Test
        run: dotnet test backend/HSMS.Tests/HSMS.Tests.csproj -c Release --no-build --verbosity normal

  frontend_ci:
    name: Frontend CI (Install + Build)
    runs-on: ubuntu-latest
    # Run CI for PRs, and for pushes to develop only (avoid duplicate CI on main pushes)
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/HWSMS_UI/package-lock.json

      - name: Install
        working-directory: frontend/HWSMS_UI
        run: npm ci

      - name: Build
        working-directory: frontend/HWSMS_UI
        run: npm run build

  deploy_main:
    name: Deploy (PR to Main)
    runs-on: ubuntu-latest
    needs: [ backend_ci, frontend_ci ]
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      # ---- Backend publish + deploy ----
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ vars.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj', 'backend/**/*.sln') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore backend
        run: dotnet restore backend/HSMS.sln

      - name: Publish API
        run: dotnet publish backend/HSMS.API/HSMS.API.csproj -c Release --no-restore -o ${{ runner.temp }}/backend_publish

      - name: Deploy Azure Web App (Backend)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ runner.temp }}/backend_publish

      - name: Deploy Azure Web App (Backend)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_BACKEND_APP_NAME }}
          slot-name: ${{ vars.AZURE_BACKEND_SLOT }}
          package: ${{ runner.temp }}/backend_publish

      # ---- Frontend build + deploy (avoid Oryx detection issues) ----
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/HWSMS_UI/package-lock.json

      - name: Install & Build Frontend
        working-directory: frontend/HWSMS_UI
        run: |
          npm ci
          npm run build

      - name: Deploy Azure Static Web App (Frontend)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/HWSMS_UI
          api_location: ""
          output_location: ${{ vars.FRONTEND_OUTPUT_DIR }}

          skip_app_build: true

