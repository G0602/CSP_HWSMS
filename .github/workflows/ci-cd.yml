name: HSMS CI/CD

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["develop", "main"]
  push:
    branches: ["develop", "main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hsms-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

# =========================
# 🔵 BACKEND CI
# =========================
  backend_ci:
    name: Backend CI (Build + Tests)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hsms_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      HSMS_TEST_CONNECTION_STRING: Server=127.0.0.1;Port=3306;Database=hsms_test;Uid=root;Pwd=root

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj', 'backend/**/*.sln') }}

      - name: Restore
        run: dotnet restore backend/HSMS.sln

      - name: Build
        run: dotnet build backend/HSMS.sln -c Release --no-restore

      - name: Run Tests
        run: dotnet test backend/HSMS.Tests/HSMS.Tests.csproj -c Release --no-build

# =========================
# 🟣 FRONTEND CI
# =========================
  frontend_ci:
    name: Frontend CI (Build)
    runs-on: ubuntu-latest

    outputs:
      build-path: frontend/HWSMS_UI/dist

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/HWSMS_UI/package-lock.json

      - name: Install Dependencies
        working-directory: frontend/HWSMS_UI
        run: npm ci

      - name: Build Frontend
        working-directory: frontend/HWSMS_UI
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/HWSMS_UI/dist

# =========================
# 🔵 BACKEND DEPLOY
# =========================
  deploy_backend:
    name: Deploy Backend (Azure App Service)
    runs-on: ubuntu-latest
    needs: backend_ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore backend/HSMS.sln

      - name: Publish API
        run: dotnet publish backend/HSMS.API/HSMS.API.csproj -c Release -o ${{ runner.temp }}/backend_publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ runner.temp }}/backend_publish

# =========================
# 🟢 FRONTEND DEPLOY
# =========================
  deploy_frontend:
    name: Deploy Frontend (Azure Static Web Apps)
    runs-on: ubuntu-latest
    needs: frontend_ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend_build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APP_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend_build"
          output_location: ""