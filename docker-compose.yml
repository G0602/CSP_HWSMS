# ─────────────────────────────────────────────────────────────────────────────
# HSMS — Root-level Docker Compose
# Brings up the full stack locally: Backend API + Frontend (Nginx)
#
# The backend connects to your existing Azure MySQL server via
# CONNECTIONSTRINGS__DEFAULTCONNECTION — no local DB container needed here.
#
# Usage:
#   cp .env.example .env   # fill in real values (same names as GitHub Secrets)
#   docker compose up --build
#
# All variable names match the GitHub Secrets/Variables used in ci-cd.yml.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── ASP.NET Core Backend API ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: final
    container_name: hsms_backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS}
      # Single connection string pointing at the Azure MySQL server
      CONNECTIONSTRINGS__DEFAULTCONNECTION: ${CONNECTIONSTRINGS__DEFAULTCONNECTION}
      DB__HOST: ${DB__HOST}
      DB__PORT: ${DB__PORT}
      DB__NAME: ${DB__NAME}
      DB__USER: ${DB__USER}
      DB__PASSWORD: ${DB__PASSWORD}
      JWT__SECRET: ${JWT__SECRET}
      JWT__ISSUER: ${JWT__ISSUER}
      JWT__AUDIENCE: ${JWT__AUDIENCE}
      JWT__ACCESSTOKENEXPIRYMINUTES: ${JWT__ACCESSTOKENEXPIRYMINUTES}
      URL__BACKEND: ${URL__BACKEND}
      URL__FRONTEND: ${URL__FRONTEND}
      Password__Admin: ${Password__Admin}
      Password__Manager: ${Password__Manager}
      Password__Cashier: ${Password__Cashier}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - hsms_net

  # ── React / Nginx Frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/HWSMS_UI
      target: final
      args:
        # VITE_API_BASE_URL is a build arg — baked into the JS bundle at build time
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: hsms_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - hsms_net

networks:
  hsms_net:
    driver: bridge
